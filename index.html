<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>QB Bio Drill</title>
<style>
  :root{
    --bg:#0c0c0d; --raise:#141416; --line:#222224;
    --text:#ededee; --muted:#8a8a8f; --faint:#56565b;
    --gold:#c9a84c; --crimson:#cf3a4e;
    --chrome:#cfcfd2; --chrome-mid:var(--gold); --urgent:var(--crimson);
    --good:var(--gold); --bad:var(--crimson);
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;min-height:100vh;font-weight:400}
  #app{max-width:440px;margin:0 auto;padding:28px 18px calc(32px + env(safe-area-inset-bottom))}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:3px;color:var(--faint)}
  h1{font-size:26px;line-height:1.15;margin:10px 0 4px;font-weight:500;color:var(--text)}
  .sub{color:var(--muted);font-size:13px;line-height:1.5;margin:0 0 26px}
  .label{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.5px;margin-bottom:8px}
  .field{margin-bottom:18px}
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{font-family:var(--mono);font-size:13px;padding:8px 12px;border-radius:8px;
    border:1px solid var(--line);background:transparent;color:var(--muted)}
  .chip.on{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08)}
  button{cursor:pointer;font-family:var(--mono)}
  .btn{width:100%;font-size:14px;font-weight:600;padding:13px;border-radius:8px;letter-spacing:.3px;
    border:1px solid var(--gold);background:transparent;color:var(--gold)}
  .btn:active{background:rgba(201,168,76,.12)}
  .btn.ghost{border-color:var(--line);color:var(--muted)}
  .btn.ghost:active{background:rgba(255,255,255,.04)}
  .row{display:flex;gap:10px}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .mini{background:none;border:none;font-size:11px;color:var(--faint)}
  .stats{display:flex;gap:18px;margin-bottom:20px;font-family:var(--mono);font-size:12px}
  .stat .v{font-size:18px;font-weight:500}
  .stat .k{color:var(--faint);font-size:10px;letter-spacing:.5px;margin-top:1px}
  .meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;
    font-family:var(--mono);font-size:11px;letter-spacing:.5px}
  .barwrap{height:2px;background:#1d1d1f;border-radius:2px;overflow:hidden;margin-bottom:22px}
  .bar{height:100%;width:100%;background:var(--gold);transition:width .05s linear}
  .bar.ans{background:var(--crimson)}
  .clue{font-size:18px;line-height:1.58;min-height:150px;margin-bottom:18px;color:#e6e6e8}
  input.ans{width:100%;font-family:var(--sans);font-size:17px;padding:12px 0;border:none;
    border-bottom:1px solid var(--line);background:transparent;color:var(--text);margin-bottom:12px}
  input.ans::placeholder{color:var(--faint)}
  input.ans:focus{outline:none;border-bottom-color:var(--gold)}
  .answer{border-left:2px solid var(--gold);padding:2px 0 2px 14px;margin-bottom:20px}
  .answer .tag{font-family:var(--mono);font-size:10px;letter-spacing:1px;margin-bottom:5px;color:var(--faint)}
  .answer .txt{font-size:17px;color:var(--text);line-height:1.4}
  .answer .src{font-family:var(--mono);font-size:10px;color:var(--faint);margin-top:8px}
  .verdict{font-family:var(--mono);font-size:13px;letter-spacing:.5px;margin-bottom:12px}
  .err{border:1px solid var(--crimson);border-radius:8px;padding:12px 14px;color:#e9b3ba;
    font-size:13px;line-height:1.5;margin-top:16px;font-family:var(--mono)}
  .err code{color:var(--text);word-break:break-all}
  .sticky{position:sticky;bottom:0;padding-top:8px;
    background:linear-gradient(to top,var(--bg) 75%,transparent)}
</style>
</head>
<body>
<div id="app"></div>
<script>
const CONFIG = { PROXY: "" };

const ORIGIN = "https://www.qbreader.org/api/";
const apiUrl = (endpoint, params) => {
  const base = CONFIG.PROXY ? CONFIG.PROXY + endpoint : ORIGIN + endpoint;
  const qs = params ? "?" + new URLSearchParams(params).toString() : "";
  return base + qs;
};

const SUBCATS = ["Biology", "Chemistry", "Physics", "Other Science"];
const DIFFS = { "Hard (8–10)": [8,9,10], "Mixed (6–10)": [6,7,8,9,10], "Brutal (10)": [10] };
const SECS = [3,5,7,10];
const ANS_SECS = [3,4,5];

function splitClues(text){
  if(!text) return [];
  let s = text.replace(/\s+/g," ").trim();
  const K = "\u0001";
  s = s.replace(/\b((?:[A-Za-z]\.){2,})\s+(?=[A-Z])/g, (m,g)=> g+K);
  s = s.replace(/\b([A-Z])\.\s+(?=[A-Za-z])/g, (m,g)=> g+"."+K);
  const ABBR = ["Dr","Mr","Mrs","Ms","Prof","Sen","Rep","Gov","St","Mt","vs","etc","al",
                "Fig","figs","No","Vol","pp","ca","approx","Inc","Ltd","Co","Jr","Sr",
                "Gen","cf","Rev","Eq","eq","ref"];
  const re = new RegExp("\\b(" + ABBR.join("|") + ")\\.\\s+","g");
  s = s.replace(re, (m,g)=> g+"."+K);
  s = s.replace(/\b(e\.g|i\.e)\.\s+/gi, (m,g)=> g+"."+K);
  const parts = s.split(/([.?!]["')\]]?)\s+(?=[A-Z""'(\[])/);
  const out = [];
  for(let i=0;i<parts.length;i+=2){
    let seg = (parts[i]||"") + (parts[i+1]||"");
    seg = seg.split(K).join(" ").replace(/\s+/g," ").trim();
    if(seg) out.push(seg);
  }
  return out.length ? out : [s];
}

const S = {
  screen:"settings",
  subcat:"Biology", diffLabel:"Hard (8–10)", seconds:5, answerSeconds:3, clueMode:true,
  queue:[], cur:null, clues:[], clueIdx:0,
  phase:"idle", buzzAt:null, verdict:null, promptHint:null,
  stats:{seen:0,got:0,missed:0,buzzSum:0,buzzN:0},
  error:null, loading:false,
  deadline:0, interval:null
};

const app = () => document.getElementById("app");
const el = (id) => document.getElementById(id);
const esc = (t) => (t||"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

async function fetchBatch(){
  S.loading = true; S.error = null;
  try{
    const r = await fetch(apiUrl("random-tossup", {
      categories:"Science", subcategories:S.subcat,
      difficulties:DIFFS[S.diffLabel].join(","), number:"20"
    }));
    if(!r.ok) throw new Error("API returned " + r.status);
    const data = await r.json();
    const t = (data.tossups||[]).filter(x => x.question_sanitized);
    if(!t.length) throw new Error("No questions matched those filters.");
    S.queue.push(...t);
    return t;
  }catch(e){
    const net = /Failed to fetch|NetworkError|Load failed/i.test(e.message||"");
    S.error = net
      ? "Couldn't reach the API. If opening the URL below in this browser shows JSON, the API is up and the block is CORS — deploy the proxy (see chat) and set PROXY at the top of this file. If the URL also fails, it's your network."
      : e.message;
    return [];
  }finally{ S.loading = false; }
}

function loadNext(){
  if(!S.queue.length){ S.phase="idle"; render(); return; }
  S.cur = S.queue.shift();
  S.clues = splitClues(S.cur.question_sanitized);
  S.clueIdx = 0; S.buzzAt = null; S.verdict = null; S.promptHint = null;
  S.phase = "running";
  if(S.queue.length < 4) fetchBatch();
  render(); startClueTimer();
}

function stopTimer(){ if(S.interval){ clearInterval(S.interval); S.interval=null; } }

function startClueTimer(){
  stopTimer();
  if(S.phase !== "running") return;
  S.deadline = Date.now() + S.seconds*1000;
  S.interval = setInterval(()=>{
    const left = Math.max(0, S.deadline - Date.now());
    const bar = el("bar"), tm = el("time");
    if(bar) bar.style.width = (left/(S.seconds*1000)*100) + "%";
    if(tm) tm.textContent = (left/1000).toFixed(1) + "s";
    if(left <= 0){
      if(S.clueMode && S.clueIdx < S.clues.length-1){ S.clueIdx++; render(); startClueTimer(); }
      else { reveal(null, false); }
    }
  }, 100);
}

function startAnswerTimer(){
  stopTimer();
  S.deadline = Date.now() + S.answerSeconds*1000;
  S.interval = setInterval(()=>{
    const left = Math.max(0, S.deadline - Date.now());
    const bar = el("abar"), tm = el("atime");
    if(bar) bar.style.width = (left/(S.answerSeconds*1000)*100) + "%";
    if(tm) tm.textContent = (left/1000).toFixed(1) + "s";
    if(left <= 0){
      stopTimer();
      const inp = el("ansInput");
      if(inp && inp.value.trim()) submitAnswer();
      else reveal(S.buzzAt, false, "tooslow");
    }
  }, 100);
}

function buzz(){ stopTimer(); S.buzzAt = S.clueIdx; S.phase = "answering"; S.promptHint=null; render(); startAnswerTimer(); }

async function submitAnswer(){
  stopTimer();
  const inp = el("ansInput"); if(!inp) return;
  const given = inp.value.trim(); if(!given){ startAnswerTimer(); return; }
  inp.disabled = true;
  try{
    const r = await fetch(apiUrl("check-answer", {
      answerline: S.cur.answer || S.cur.answer_sanitized, givenAnswer: given
    }));
    const d = await r.json();
    if(d.directive === "prompt"){
      S.promptHint = d.directedPrompt || "Prompt — be more specific.";
      render();
      const ni = el("ansInput"); if(ni){ ni.value=""; ni.focus(); }
      startAnswerTimer();
      return;
    }
    reveal(S.clueIdx, d.directive === "accept");
  }catch(e){ S.error = "Judge request failed: " + e.message; render(); }
}

function reveal(at, correct, kind){
  stopTimer();
  S.buzzAt = at;
  S.phase = "revealed";
  const got = correct === true;
  S.verdict = kind || (at===null ? "timeout" : (got ? "correct" : "incorrect"));
  S.stats.seen++;
  if(got) S.stats.got++; else S.stats.missed++;
  if(at!=null){ S.stats.buzzSum += at+1; S.stats.buzzN++; }
  render();
}

function giveUp(){ reveal(S.buzzAt, false, "incorrect"); }

async function start(){
  S.screen="drill"; S.stats={seen:0,got:0,missed:0,buzzSum:0,buzzN:0};
  render();
  await fetchBatch();
  loadNext();
}

function chip(opt,cur,on){ return `<button class="chip ${opt===cur?'on':''}" data-${on}="${esc(opt)}">${esc(opt)}</button>`; }

function renderSettings(){
  app().innerHTML = `
    <div class="eyebrow">QB · BIO DRILL</div>
    <h1>Tossup buzzpoint trainer</h1>
    <p class="sub">Live questions from the QBReader database. Clue-by-clue reveal, buzz, then a short window to answer — auto-graded.</p>
    <div class="field"><div class="label">Subcategory</div>
      <div class="chips">${SUBCATS.map(o=>chip(o,S.subcat,"sub")).join("")}</div></div>
    <div class="field"><div class="label">Difficulty (tournament scale, not academic level)</div>
      <div class="chips">${Object.keys(DIFFS).map(o=>chip(o,S.diffLabel,"diff")).join("")}</div></div>
    <div class="field"><div class="label">Seconds per clue</div>
      <div class="chips">${SECS.map(o=>chip(String(o),String(S.seconds),"sec")).join("")}</div></div>
    <div class="field"><div class="label">Answer window (after buzz)</div>
      <div class="chips">${ANS_SECS.map(o=>chip(String(o),String(S.answerSeconds),"asec")).join("")}</div></div>
    <div class="field"><div class="label">Reveal mode</div>
      <div class="chips">
        ${chip("Clue-by-clue", S.clueMode?"Clue-by-clue":"Whole question","mode")}
        ${chip("Whole question", S.clueMode?"Clue-by-clue":"Whole question","mode")}
      </div></div>
    <button class="btn" id="startBtn">${S.loading?"Loading…":"Start drill"}</button>
    ${S.error?`<div class="err">${esc(S.error)}<br><br><code>${esc(apiUrl("random-tossup",{categories:"Science",subcategories:S.subcat,difficulties:DIFFS[S.diffLabel].join(","),number:"1"}))}</code></div>`:""}
  `;
  document.querySelectorAll("[data-sub]").forEach(b=>b.onclick=()=>{S.subcat=b.dataset.sub;render();});
  document.querySelectorAll("[data-diff]").forEach(b=>b.onclick=()=>{S.diffLabel=b.dataset.diff;render();});
  document.querySelectorAll("[data-sec]").forEach(b=>b.onclick=()=>{S.seconds=Number(b.dataset.sec);render();});
  document.querySelectorAll("[data-asec]").forEach(b=>b.onclick=()=>{S.answerSeconds=Number(b.dataset.asec);render();});
  document.querySelectorAll("[data-mode]").forEach(b=>b.onclick=()=>{S.clueMode=(b.dataset.mode==="Clue-by-clue");render();});
  el("startBtn").onclick=start;
}

function renderDrill(){
  const avg = S.stats.buzzN ? (S.stats.buzzSum/S.stats.buzzN).toFixed(1) : "—";
  const shown = S.clueMode ? S.clues.slice(0,S.clueIdx+1).join(" ") : S.clues.join(" ");
  let controls = "";
  if(S.phase==="running"){
    controls = `<button class="btn" id="buzzBtn">Buzz</button>`;
  } else if(S.phase==="answering"){
    controls = `
      <input class="ans" id="ansInput" type="text" autocomplete="off" autocapitalize="off"
        autocorrect="off" placeholder="Answer — clock is running" />
      ${S.promptHint?`<div class="verdict" style="color:var(--gold)">↳ ${esc(S.promptHint)}</div>`:""}
      <div class="row">
        <button class="btn ghost" id="giveBtn">Give up</button>
        <button class="btn" id="subBtn">Submit</button>
      </div>`;
  } else if(S.phase==="revealed"){
    controls = `<button class="btn" id="nextBtn">Next</button>`;
  } else {
    controls = S.loading ? `<div class="label">Loading…</div>` : `<button class="btn" id="nextBtn">Next</button>`;
  }

  let verdictHtml = "";
  if(S.phase==="revealed"){
    const v = S.verdict;
    const map = {correct:["✓ correct","var(--gold)"], incorrect:["✗ incorrect","var(--crimson)"],
                 tooslow:["✗ too slow","var(--crimson)"], timeout:["— timed out","var(--faint)"]};
    const [txt,col] = map[v] || map.timeout;
    verdictHtml = `<div class="verdict" style="color:${col}">${txt}</div>`;
  }

  let barHtml = "";
  if(S.phase==="running"){
    barHtml = `<div class="meta">
        <span style="color:var(--gold)">${S.clueMode?`CLUE ${String(S.clueIdx+1).padStart(2,"0")} / ${String(S.clues.length).padStart(2,"0")}`:"FULL QUESTION"}</span>
        <span id="time" style="color:var(--faint)">${S.seconds.toFixed(1)}s</span></div>
      <div class="barwrap"><div class="bar" id="bar"></div></div>`;
  } else if(S.phase==="answering"){
    barHtml = `<div class="meta">
        <span style="color:var(--crimson)">ANSWER</span>
        <span id="atime" style="color:var(--faint)">${S.answerSeconds.toFixed(1)}s</span></div>
      <div class="barwrap"><div class="bar ans" id="abar"></div></div>`;
  } else {
    barHtml = `<div class="meta">
        <span style="color:var(--faint)">${S.clueMode?`CLUE ${String(S.clueIdx+1).padStart(2,"0")} / ${String(S.clues.length).padStart(2,"0")}`:"FULL QUESTION"}</span>
        <span style="color:var(--faint)"></span></div>
      <div class="barwrap"><div class="bar" style="width:0%"></div></div>`;
  }

  app().innerHTML = `
    <div class="topbar">
      <span class="label" style="margin:0">${esc(S.subcat.toUpperCase())} · D${DIFFS[S.diffLabel].join("/")}</span>
      <button class="mini" id="setBtn">settings</button>
    </div>
    <div class="stats">
      <div class="stat"><div class="v">${S.stats.seen}</div><div class="k">seen</div></div>
      <div class="stat"><div class="v" style="color:var(--gold)">${S.stats.got}</div><div class="k">got</div></div>
      <div class="stat"><div class="v" style="color:var(--crimson)">${S.stats.missed}</div><div class="k">missed</div></div>
      <div class="stat"><div class="v">${avg}</div><div class="k">avg buzz clue</div></div>
    </div>
    ${S.error?`<div class="err">${esc(S.error)}</div>`:""}
    ${S.cur?`
      ${barHtml}
      <div class="clue">${esc(shown)}</div>
      ${verdictHtml}
      ${S.phase==="revealed"?`
        <div class="answer">
          <div class="tag">ANSWER ${S.buzzAt!=null?"· buzzed clue "+(S.buzzAt+1):"· timed out"}</div>
          <div class="txt">${esc(S.cur.answer_sanitized)}</div>
          <div class="src">${esc(S.cur.set?.name||"")} · diff ${S.cur.difficulty}</div>
        </div>`:""}
    `:""}
    <div class="sticky">${controls}</div>
  `;

  if(el("setBtn")) el("setBtn").onclick=()=>{stopTimer();S.screen="settings";S.phase="idle";S.cur=null;render();};
  if(el("buzzBtn")) el("buzzBtn").onclick=buzz;
  if(el("subBtn")) el("subBtn").onclick=submitAnswer;
  if(el("giveBtn")) el("giveBtn").onclick=giveUp;
  if(el("nextBtn")) el("nextBtn").onclick=()=>loadNext();
  const ai = el("ansInput");
  if(ai){ ai.focus(); ai.onkeydown=(e)=>{ if(e.key==="Enter") submitAnswer(); }; }
}

function render(){ if(S.screen==="settings") renderSettings(); else renderDrill(); }
render();
</script>
</body>
</html>
